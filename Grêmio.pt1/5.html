<body>

    <h1>Área do Torcedor</h1>

    <form action="#" method="post">

        <p>
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome">
        </p>

        <p>
            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" name="idade">
        </p>

        <p>
            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email">
        </p>

        <p>
            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" name="cidade">
        </p>

        <p>
            <label for="time">Time do Coração:</label><br>
            <select id="time" name="time">
                <option>Selecione</option>
                <option>Grêmio</option>
                <option>Internacional</option>
                <option>Juventude</option>
                <option>Caxias</option>
            </select>
        </p>

        <p>
            <input type="radio" id="socio" name="socio">
            <label for="socio">Sou sócio do Grêmio</label>
        </p>
            <input type="submit" value="Tornar-se sócio">
        <p>
            <input type="submit" value="Enviar">
        </p>

    </form>
        </main>
        <footer>
            <p>Contato</p>
            <p>Redes Sociais</p>
